---
services:
  ocis:
    volumes:
      - ./config/ocis/apps.yaml:/etc/ocis/apps.yaml
    depends_on:
      externalsites-init:
        condition: service_completed_successfully

  externalsites-init:
    image: owncloud/web-extensions:external-sites-0.3.2@sha256:04a371c7631f665c8f41ca7dd65b114c1c39577ed8a6d14776259a2ca1091996
    platform: linux/${IMAGE_ARCH:-amd64}
    user: root
    volumes:
      - ocis-apps:/apps
    entrypoint:
      - /bin/sh
    command: ["-c", "cp -R /var/lib/nginx/html/external-sites/ /apps"]
