---
services:
  ocis:
    depends_on:
      jsonviewer-init:
        condition: service_completed_successfully

  jsonviewer-init:
    image: owncloud/web-extensions:json-viewer-0.3.2@sha256:9bce031e709c82a2cf18742d8b80832868acb01bda8a709085613fd8ba8ae596
    user: root
    volumes:
      - ocis-apps:/apps
    entrypoint:
      - /bin/sh
    command: ["-c", "cp -R /var/lib/nginx/html/json-viewer/ /apps"]
