name: Composite Actions Test

on:
  workflow_dispatch:

jobs:
  composite-actions-apiGraph:
    name: composite-actions-apiGraph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate
      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer

      - name: Build oCIS from source
        run: |
          make ci-node-generate
          make -C ocis build

      - name: Setup oCIS
        uses: ./.github/actions/ocis-setup
        with:
          ocis-binary: ocis/bin/ocis

      - name: Test apiGraph
        uses: ./.github/actions/ocis-test
        with:
          suite: apiGraph
