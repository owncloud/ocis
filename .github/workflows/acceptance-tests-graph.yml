name: Acceptance Tests - Graph

on:
  pull_request:
  workflow_dispatch:

jobs:
  acceptance-tests-graph:
    name: apiGraph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip
          tools: composer

      - name: Run graph acceptance tests
        run: bash tests/acceptance/run-graph.sh

