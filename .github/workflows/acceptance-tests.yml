name: Acceptance Tests

on:
  workflow_dispatch:

jobs:
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.check.outputs.docs-only }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check if changes are docs-only
        id: check
        run: |
          # Always run full CI on workflow_dispatch, tags, or when PR title contains [full-ci]
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "docs-only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_TITLE="${{ github.event.pull_request.title }}"
          if echo "$PR_TITLE" | grep -qi "\[full-ci\]"; then
            echo "docs-only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get changed files between the PR base and head
          CHANGED_FILES=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" 2>/dev/null || git diff --name-only HEAD~1)

          # Patterns that are considered documentation/non-code changes
          DOCS_ONLY=true
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/*) DOCS_ONLY=false; break ;;
              .github/*|.vscode/*|changelog/*|docs/*|deployments/*) ;;
              */CHANGELOG.md|*/CONTRIBUTING.md|*/README.md|CHANGELOG.md|CONTRIBUTING.md|LICENSE|README.md) ;;
              *) DOCS_ONLY=false; break ;;
            esac
          done <<< "$CHANGED_FILES"

          echo "docs-only=$DOCS_ONLY" >> "$GITHUB_OUTPUT"
          echo "Changed files docs-only: $DOCS_ONLY"

  build-and-test:
    name: build-and-test
    needs: [detect-changes]
    if: needs.detect-changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.28.1"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.33.3 --activate

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer

      - name: Install libvips-dev for ENABLE_VIPS build
        run: |
          sudo apt-get update -qq
          # NEEDRESTART_MODE=a: auto-restart services silently; without this, needrestart can fail with exit code 6
          sudo NEEDRESTART_MODE=a apt-get install -y libvips-dev

      - name: Pre-checks and generate
        run: |
          # Phase 1 — I/O + light CPU, no contention between tasks.
          # wa (I/O wait) will spike during npm/pnpm downloads.
          # Expected avg load: ~50-60 % CPU on 2 vCPU.
          vmstat 2 > /tmp/vmstat-phase1.log & MONITOR_PID=$!

          (make vendor-bin-codestyle && make vendor-bin-codesniffer && make test-php-style && make check-env-var-annotations) > /tmp/php-style.log   2>&1 & PIDS=($!)
          (npm install -g @gherlint/gherlint@1.1.0 && make test-gherkin-lint)                                                 > /tmp/gherkin.log     2>&1 & PIDS+=($!)
          bash tests/acceptance/check-deleted-suites-in-expected-failure.sh                                                   > /tmp/suites.log      2>&1 & PIDS+=($!)
          make govulncheck                                                                                                     > /tmp/govulncheck.log 2>&1 & PIDS+=($!)
          make ci-node-generate                                                                                                > /tmp/node-gen.log    2>&1 & PIDS+=($!)
          make ci-go-generate                                                                                                  > /tmp/go-gen.log      2>&1 & PIDS+=($!)
          make changelog-lint                                                                                                   > /tmp/changelog-lint.log 2>&1 & PIDS+=($!)

          FAILED=0
          for PID in "${PIDS[@]}"; do wait "$PID" || FAILED=1; done
          kill $MONITOR_PID 2>/dev/null; wait $MONITOR_PID 2>/dev/null || true

          # How to read the load line:
          #   busy    — % of time CPUs were doing work  (100% = fully saturated)
          #   runq    — processes waiting for a CPU turn; runq >> nCPU means tasks
          #             compete and each runs slower (runq 10 on 2 vCPU = ~5× slower)
          #   wa      — % waiting on disk/network; wa > 20% = I/O bound, not CPU bound
          #             → high wa: add more parallel tasks; high runq: reduce them
          awk '/^[ ]*[0-9]/ { busy=100-$15; sum_b+=busy; if(busy>pk_b)pk_b=busy;
                               sum_r+=$1;   if($1>pk_r) pk_r=$1; sum_wa+=$16; n++ }
               END { printf "=== phase 1 load (2 vCPU): avg busy %d%% peak %d%% | avg runq %.0f peak %d | avg wa %d%%\n",
                     sum_b/n, pk_b, sum_r/n, pk_r, sum_wa/n }' /tmp/vmstat-phase1.log

          echo "=== php-style ==="       && cat /tmp/php-style.log
          echo "=== gherkin ==="          && cat /tmp/gherkin.log
          echo "=== suites ==="           && cat /tmp/suites.log
          echo "=== govulncheck ==="      && cat /tmp/govulncheck.log
          echo "=== ci-node-generate ===" && cat /tmp/node-gen.log
          echo "=== ci-go-generate ==="   && cat /tmp/go-gen.log
          echo "=== changelog-lint ===" && cat /tmp/changelog-lint.log

          exit $FAILED

      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          trivy-config: .trivy.yaml

      - name: Build, lint and test
        run: |
          # Phase 2 — all three are CPU-bound Go compilation on 2 vCPU.
          # They compete for CPU (expect id < 10, load ~95 %) but share the
          # Go build cache within this runner, so make test reuses artifacts
          # from the ocis build. Critical path = ocis build (~300 s).
          vmstat 2 > /tmp/vmstat-phase2.log & MONITOR_PID=$!

          make ci-golangci-lint                          > /tmp/golangci-lint.log      2>&1 & PIDS=($!)
          ENABLE_VIPS=true make -C ocis build            > /tmp/ocis-build.log         2>&1 & PIDS+=($!)
          make test                                      > /tmp/unit-tests.log         2>&1 & PIDS+=($!)
          GOWORK=off make -C tests/ociswrapper build     > /tmp/ociswrapper-build.log  2>&1 & PIDS+=($!)

          FAILED=0
          for PID in "${PIDS[@]}"; do wait "$PID" || FAILED=1; done
          kill $MONITOR_PID 2>/dev/null; wait $MONITOR_PID 2>/dev/null || true

          # Signal: busy=saturated  runq>>2=tasks competing(slows each)  wa>20%=I/O bound
          awk '/^[ ]*[0-9]/ { busy=100-$15; sum_b+=busy; if(busy>pk_b)pk_b=busy;
                               sum_r+=$1;   if($1>pk_r) pk_r=$1; sum_wa+=$16; n++ }
               END { printf "=== phase 2 load (2 vCPU): avg busy %d%% peak %d%% | avg runq %.0f peak %d | avg wa %d%%\n",
                     sum_b/n, pk_b, sum_r/n, pk_r, sum_wa/n }' /tmp/vmstat-phase2.log

          echo "=== golangci-lint ==="     && cat /tmp/golangci-lint.log
          echo "=== ocis build ==="        && cat /tmp/ocis-build.log
          echo "=== ociswrapper build ===" && cat /tmp/ociswrapper-build.log
          echo "=== unit tests ==="        && cat /tmp/unit-tests.log

          exit $FAILED

      - name: Upload oCIS binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ocis-binary
          path: ocis/bin/ocis
          retention-days: 1
          if-no-files-found: error

      - name: Upload ociswrapper binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ociswrapper-binary
          path: tests/ociswrapper/bin/ociswrapper
          retention-days: 1
          if-no-files-found: error

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run unit tests
        run: make test

  # ---------------------------------------------------------------------------
  # API acceptance tests — split by required services so each group gets a
  # single fixed ocis-setup call with no per-suite conditionals.
  # ---------------------------------------------------------------------------

  api-tests-plain:
    name: ${{ matrix.suite }}
    needs: [build-and-test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          # contract & locks
          - apiContract
          - apiLocks
          # graph
          - apiGraphUser
          - apiGraph
          - apiGraphGroup
          # spaces & dav
          - apiSpaces
          - apiSpacesShares
          - apiSpacesDavOperation
          - apiDownloads
          - apiAsyncUpload
          - apiDepthInfinity
          - apiArchiver
          - apiActivities
          # search (no tika)
          - apiSearch1
          # sharing
          - apiSharingNgShares
          - apiReshare
          - apiSharingNgPermissions
          - apiSharingNgAdditionalShareRole
          - apiSharingNgDriveInvitation
          - apiSharingNgItemInvitation
          - apiSharingNgDriveLinkShare
          - apiSharingNgItemLinkShare
          - apiSharingNgLinkShareManagement
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          demo-users: "true"
      - name: Test ${{ matrix.suite }}
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: ${{ matrix.suite }}

  api-tests-email:
    name: ${{ matrix.suite }}
    needs: [build-and-test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          # settings & notifications (needs Mailpit)
          - apiSettings
          - apiNotification
          - apiCors
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          demo-users: "true"
          email: "true"
      - name: Test ${{ matrix.suite }}
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: ${{ matrix.suite }}

  api-tests-tika:
    name: ${{ matrix.suite }}
    needs: [build-and-test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          # full-text search (needs Tika)
          - apiSearch2
          - apiSearchContent
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          demo-users: "true"
          tika: "true"
      - name: Test ${{ matrix.suite }}
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: ${{ matrix.suite }}

  api-tests-antivirus:
    name: apiAntivirus
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          demo-users: "true"
          antivirus: "true"
          extra-server-env: '{"POSTPROCESSING_STEPS":"virusscan"}'
      - name: Test apiAntivirus
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: apiAntivirus

  api-tests-auth-app:
    name: apiAuthApp
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          demo-users: "true"
          extra-server-env: '{"OCIS_ADD_RUN_SERVICES":"auth-app","PROXY_ENABLE_APP_AUTH":"true"}'
      - name: Test apiAuthApp
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: apiAuthApp

  api-tests-ocm:
    name: apiOcm
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer
      - name: Patch OCM providers.json — replace Docker hostnames with localhost for CI
        run: |
          # providers.json uses Docker Compose hostnames (ocis-server, federation-ocis-server).
          # In CI both instances run on localhost at ports 9200/10200.
          sed \
            -e 's|ocis-server:9200|localhost:9200|g' \
            -e 's|federation-ocis-server:10200|localhost:10200|g' \
            tests/config/ci/providers.json > /tmp/ocm-providers.json
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          demo-users: "true"
          email: "true"
          extra-server-env: >-
            {"OCIS_ADD_RUN_SERVICES":"ocm,notifications","OCIS_ENABLE_OCM":"true",
            "OCM_OCM_INVITE_MANAGER_INSECURE":"true","OCM_OCM_SHARE_PROVIDER_INSECURE":"true",
            "OCM_OCM_STORAGE_PROVIDER_INSECURE":"true",
            "OCM_OCM_PROVIDER_AUTHORIZER_PROVIDERS_FILE":"/tmp/ocm-providers.json",
            "NOTIFICATIONS_SMTP_HOST":"localhost","NOTIFICATIONS_SMTP_PORT":"1025",
            "NOTIFICATIONS_SMTP_INSECURE":"true",
            "NOTIFICATIONS_SMTP_SENDER":"ownCloud <noreply@example.com>",
            "NOTIFICATIONS_DEBUG_ADDR":"0.0.0.0:9174"}
      - name: Setup federation oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary: ocis/bin/ocis
          ocis-url: "https://localhost:10200"
          ocis-config-dir: /home/runner/.ocis-federation/config
          wrapper: "false"
          demo-users: "true"
          skip-test-runner-setup: "true"
          pid-file: /tmp/ocis-federation.pid
          log-file: /tmp/ocis-federation.log
          debug-port-offset: "1000"
          extra-server-env: >-
            {"OCIS_BASE_DATA_PATH":"/home/runner/.ocis-federation",
            "OCIS_RUNTIME_PORT":"10250",
            "NATS_NATS_PORT":"10233",
            "OCIS_EVENTS_ENDPOINT":"127.0.0.1:10233",
            "MICRO_REGISTRY":"memory",
            "OCIS_INSECURE":"true",
            "OCIS_LDAP_URI":"ldaps://localhost:10235",
            "STORAGE_SYSTEM_DATA_SERVER_URL":"http://localhost:10216/data",
            "STORAGE_USERS_DATA_SERVER_URL":"http://localhost:10158/data",
            "OCM_OCM_STORAGE_DATA_SERVER_URL":"http://localhost:10280/data",
            "THUMBNAILS_DATA_ENDPOINT":"http://127.0.0.1:10190/thumbnails/data",
            "OCIS_EXCLUDE_RUN_SERVICES":"idp",
            "OCIS_ADD_RUN_SERVICES":"ocm,notifications",
            "OCIS_ENABLE_OCM":"true",
            "OCM_OCM_INVITE_MANAGER_INSECURE":"true",
            "OCM_OCM_SHARE_PROVIDER_INSECURE":"true",
            "OCM_OCM_STORAGE_PROVIDER_INSECURE":"true",
            "OCM_OCM_PROVIDER_AUTHORIZER_PROVIDERS_FILE":"/tmp/ocm-providers.json",
            "NOTIFICATIONS_SMTP_HOST":"localhost","NOTIFICATIONS_SMTP_PORT":"1025",
            "NOTIFICATIONS_SMTP_INSECURE":"true",
            "NOTIFICATIONS_SMTP_SENDER":"ownCloud <noreply@example.com>"}
      - name: Test apiOcm
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: apiOcm
        env:
          TEST_SERVER_FED_URL: https://localhost:10200

  api-tests-wopi:
    name: apiCollaboration
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          demo-users: "true"
          extra-server-env: '{"GATEWAY_GRPC_ADDR":"0.0.0.0:9142"}'
          collaboration-apps: "collabora,onlyoffice,fakeoffice"
      - name: Test apiCollaboration
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: apiCollaboration
        env:
          COLLABORATION_SERVICE_URL: http://localhost:9320

  api-tests-vault:
    name: apiVault
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          keycloak: "true"
          keycloak-realm-file: tests/config/ci/ocis-mfa-ci-realm.dist.json
          web-ui-config: tests/config/ci/ocis-config-vault.json
          extra-server-env: |
            {
              "OCIS_ENABLE_VAULT_MODE": "true",
              "FRONTEND_ENABLE_VAULT_MODE": "true",
              "OCIS_MFA_ENABLED": "true",
              "WEB_OIDC_SCOPE": "openid profile email acr"
            }
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('web/pnpm-lock.yaml') }}
      - name: Install Playwright and browsers
        run: |
          vendor-php/bin/playwright-install
          vendor-php/bin/playwright-install --browsers
      - name: Start vault storage-users
        run: |
          OCIS_JWT_SECRET=some-ocis-jwt-secret \
          STORAGE_USERS_ENABLE_VAULT_MODE=true \
          STORAGE_USERS_SERVICE_NAME=storage-users-vault \
          STORAGE_USERS_GRPC_ADDR=localhost:19285 \
          STORAGE_USERS_HTTP_ADDR=localhost:19286 \
          STORAGE_USERS_DATA_SERVER_URL=http://localhost:19286/data \
          STORAGE_USERS_DEBUG_ADDR=localhost:19287 \
          STORAGE_USERS_OCIS_ROOT="${HOME}/ocis/storage/users-vault" \
          STORAGE_USERS_EVENTS_CONSUMER_GROUP=vault-dcfs \
          ocis storage-users server &>/tmp/vault-storage-users.log &
          timeout 30 bash -c 'until curl -sf http://localhost:19287/healthz; do sleep 1; done' \
            || (cat /tmp/vault-storage-users.log && exit 1)
      - name: Test apiVault
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: apiVault
        env:
          KEYCLOAK: "true"
          KC_URL: "https://localhost:8443"

  cli-tests:
    needs: [build-and-test]
    name: ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - cliCommands,apiServiceAvailability   # grouped: both need ClamAV + email services
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          demo-users: "true"
          email: "true"
          antivirus: "true"
      - name: Test ${{ matrix.suite }}
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: ${{ matrix.suite }}

  core-api-tests:
    name: ${{ matrix.suite }}
    needs: [build-and-test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - "coreApiAuth,coreApiCapabilities,coreApiFavorites,coreApiMain,coreApiVersions"
          - "coreApiShareManagementBasicToShares,coreApiShareManagementToShares"
          - "coreApiSharees"
          - "coreApiSharePublicLink2"
          - "coreApiShareOperationsToShares1,coreApiShareOperationsToShares2,coreApiSharePublicLink1,coreApiShareCreateSpecialToShares1,coreApiShareCreateSpecialToShares2,coreApiShareUpdateToShares"
          - "coreApiTrashbin,coreApiTrashbinRestore,coreApiWebdavEtagPropagation1,coreApiWebdavEtagPropagation2"
          - "coreApiWebdavDelete,coreApiWebdavOperations,coreApiWebdavMove2"
          - "coreApiWebdavProperties"
          - "coreApiWebdavMove1,coreApiWebdavPreviews,coreApiWebdavUpload,coreApiWebdavUploadTUS"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip, ldap, gd
          tools: composer
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          demo-users: "true"
      - name: Test ${{ matrix.suite }}
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: ${{ matrix.suite }}
          acceptance-test-type: core-api
          with-remote-php: "true"

  e2e-tests:
    name: e2e-${{ matrix.suite }}
    needs: [build-and-test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: part-1
            args: "--type playwright --total-parts 4 --xsuites search,app-provider,ocm,keycloak,mfa,oidc --run-part 1"
          - suite: part-2
            args: "--type playwright --total-parts 4 --xsuites search,app-provider,ocm,keycloak,mfa,oidc --run-part 2"
          - suite: part-3
            args: "--type playwright --total-parts 4 --xsuites search,app-provider,ocm,keycloak,mfa,oidc --run-part 3"
          - suite: part-4
            args: "--type playwright --total-parts 4 --xsuites search,app-provider,ocm,keycloak,mfa,oidc --run-part 4"
          - suite: search
            args: "--type playwright --suites search"
            tika: true
          - suite: keycloak
            args: "--type playwright --suites journeys,keycloak"
            keycloak: true
            demo_users: "false"
          - suite: mfa
            args: "--type playwright --suites mfa"
            mfa: true
            keycloak_realm_file: tests/config/ci/ocis-mfa-ci-realm.dist.json
          - suite: oidc
            args: "--type playwright specs/oidc/refreshToken.spec.ts"
            oidc: true
          - suite: oidc-iframe
            args: "--type playwright specs/oidc/iframeTokenRenewal.spec.ts"
            oidc_iframe: true
          - suite: app-provider
            args: "--type playwright --suites app-provider"
            collaboration: true
          - suite: ocm
            args: "--type playwright --suites ocm"
            federated: true
    steps:
      # --- tools ---
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # 24.16.0 breaks playwright install (yauzl zip extraction hangs); pin to last known good.
          # https://github.com/microsoft/playwright/issues/40724
          node-version: "24.15.0"
      - name: Enable pnpm
        run: |
          corepack enable && corepack prepare pnpm@10.33.3 --activate
          pnpm config set store-dir ./.pnpm-store

      - name: Install libvips runtime
        run: |
          sudo apt-get update -qq
          # NEEDRESTART_MODE=a: auto-restart services silently; without this, needrestart can fail with exit code 6
          sudo NEEDRESTART_MODE=a apt-get install -y libvips42t64

      # --- install ---
      - name: Cache Playwright Chromium
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('web/pnpm-lock.yaml') }}
      - name: Install web dependencies and Playwright
        run: |
          pnpm install
          pnpm exec playwright install --with-deps chromium
        working-directory: web

      # --- build extra-server-env (merge base + suite-specific vars) ---
      - name: Build extra-server-env
        shell: bash
        run: |
          BASE='{"THUMBNAILS_TXT_FONTMAP_FILE":"${{ github.workspace }}/tests/config/ci/fontsMap.json","OCIS_PASSWORD_POLICY_BANNED_PASSWORDS_LIST":"${{ github.workspace }}/tests/config/ci/banned-password-list.txt","OCIS_PASSWORD_POLICY_MIN_CHARACTERS":"3","OCIS_PASSWORD_POLICY_MIN_LOWERCASE_CHARACTERS":"0","OCIS_PASSWORD_POLICY_MIN_UPPERCASE_CHARACTERS":"0","OCIS_PASSWORD_POLICY_MIN_DIGITS":"0","OCIS_PASSWORD_POLICY_MIN_SPECIAL_CHARACTERS":"0","GRAPH_AVAILABLE_ROLES":"b1e2218d-eef8-4d4c-b82d-0f1a1b48f3b5,a8d5fe5e-96e3-418d-825b-534dbdf22b99,fb6c3e19-e378-47e5-b277-9732f9de6e21,58c63c02-1d89-4572-916a-870abc5a1b7d,2d00ce52-1fc2-4dbc-8b95-a73b73395f5a,1c996275-f1c9-4e71-abdf-a42f6495e960,312c0871-5ef7-4b3a-85b6-0e4074c64049,aa97fe03-7980-45ac-9e50-b325749fd7e6,63e64e19-8d43-42ec-a738-2b6af2610efa","FRONTEND_CONFIGURABLE_NOTIFICATIONS":"true"}'
          SUITE_EXTRA='{}'
          if [[ "${{ matrix.oidc }}" == "true" ]]; then
            SUITE_EXTRA='{"IDP_ACCESS_TOKEN_EXPIRATION":"30","WEB_OIDC_SCOPE":"openid profile email offline_access"}'
          elif [[ "${{ matrix.oidc_iframe }}" == "true" ]]; then
            SUITE_EXTRA='{"IDP_ACCESS_TOKEN_EXPIRATION":"30"}'
          elif [[ "${{ matrix.mfa }}" == "true" ]]; then
            SUITE_EXTRA='{"OCIS_MFA_ENABLED":"true"}'
          elif [[ "${{ matrix.collaboration }}" == "true" ]]; then
            SUITE_EXTRA='{"PROXY_CSP_CONFIG_FILE_LOCATION":"${{ github.workspace }}/tests/config/ci/csp.yaml","COLLABORA_DOMAIN":"localhost:9980","ONLYOFFICE_DOMAIN":"localhost:443","FRONTEND_APP_HANDLER_SECURE_VIEW_APP_ADDR":"com.owncloud.api.collaboration.Collabora"}'
          elif [[ "${{ matrix.federated }}" == "true" ]]; then
            SUITE_EXTRA='{"OCIS_ADD_RUN_SERVICES":"ocm","OCIS_ENABLE_OCM":"true","OCM_OCM_INVITE_MANAGER_INSECURE":"true","OCM_OCM_SHARE_PROVIDER_INSECURE":"true","OCM_OCM_STORAGE_PROVIDER_INSECURE":"true","OCM_OCM_PROVIDER_AUTHORIZER_PROVIDERS_FILE":"${{ github.workspace }}/tests/config/local/providers.json"}'
          fi
          MERGED=$(jq -sc '.[0] * .[1]' <(echo "$BASE") <(echo "$SUITE_EXTRA"))
          echo "OCIS_EXTRA_SERVER_ENV=$MERGED" >> "$GITHUB_ENV"

      # --- patch web-ui-config for suites that need custom OIDC scope or extra apps ---
      - name: Prepare web-ui-config
        shell: bash
        run: |
          SRC=tests/config/ci/ocis-config.json
          DEST=tests/config/ci/ocis-config-suite.json
          cp "$SRC" "$DEST"
          if [[ "${{ matrix.oidc }}" == "true" ]]; then
            jq '.openIdConnect.scope = "openid profile email offline_access"' "$DEST" > "$DEST.tmp" && mv "$DEST.tmp" "$DEST"
          elif [[ "${{ matrix.mfa }}" == "true" ]]; then
            jq '.openIdConnect.scope = "openid profile email acr"' "$DEST" > "$DEST.tmp" && mv "$DEST.tmp" "$DEST"
          elif [[ "${{ matrix.federated }}" == "true" ]]; then
            jq '.apps += ["ocm"]' "$DEST" > "$DEST.tmp" && mv "$DEST.tmp" "$DEST"
          elif [[ "${{ matrix.collaboration }}" == "true" ]]; then
            jq '.apps += ["external"]' "$DEST" > "$DEST.tmp" && mv "$DEST.tmp" "$DEST"
          fi

      # --- services ---
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          ociswrapper-artifact: ociswrapper-binary
          ocis-url: ${{ matrix.federated == true && 'https://localhost:9200' || 'https://127.0.0.1:9200' }}
          demo-users: ${{ matrix.demo_users || 'true' }}
          tika: ${{ matrix.tika || 'false' }}
          keycloak: ${{ (matrix.keycloak == true || matrix.mfa == true) && 'true' || 'false' }}
          keycloak-realm-file: ${{ matrix.keycloak_realm_file || 'tests/config/ci/ocis-ci-realm.dist.json' }}
          web-ui-config: tests/config/ci/ocis-config-suite.json
          collaboration-apps: ${{ matrix.collaboration == true && 'collabora,onlyoffice' || '' }}
          collabora-image: collabora/code:25.04.7.3.1
          onlyoffice-image: onlyoffice/documentserver:9.2.1
          app-registry-file: ${{ matrix.collaboration == true && 'web/dev/docker/ocis/app-registry.yaml' || '' }}
          # GRAPH_AVAILABLE_ROLES: viewer,spaceViewer,editor,spaceEditor,fileEditor,
          #   editorLite,manager,secureViewer,denied — full set required by e2e role tests.
          extra-server-env: ${{ env.OCIS_EXTRA_SERVER_ENV }}

      # Save primary oCIS cert before federation setup overwrites OCIS_CERT
      - name: Save primary oCIS cert
        if: matrix.federated == true
        shell: bash
        run: echo "PRIMARY_OCIS_CERT=${{ env.OCIS_CERT }}" >> "$GITHUB_ENV"

      # --- OCM federation instance (ocm suite only, starts AFTER primary so binary is available) ---
      - name: Setup federation oCIS
        if: matrix.federated == true
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary: ocis/bin/ocis
          ocis-url: "https://localhost:10200"
          ocis-config-dir: /home/runner/.ocis-federation/config
          wrapper: "false"
          demo-users: "true"
          skip-test-runner-setup: "true"
          pid-file: /tmp/ocis-federation.pid
          log-file: /tmp/ocis-federation.log
          debug-port-offset: "1000"
          web-ui-config: tests/config/ci/ocis-config-suite.json
          extra-server-env: >-
            {"OCIS_BASE_DATA_PATH":"/home/runner/.ocis-federation",
            "OCIS_RUNTIME_PORT":"10250",
            "NATS_NATS_PORT":"10233",
            "OCIS_EVENTS_ENDPOINT":"127.0.0.1:10233",
            "MICRO_REGISTRY":"memory",
            "OCIS_INSECURE":"true",
            "OCIS_LDAP_URI":"ldaps://localhost:10235",
            "STORAGE_SYSTEM_DATA_SERVER_URL":"http://localhost:10216/data",
            "STORAGE_USERS_DATA_SERVER_URL":"http://localhost:10158/data",
            "OCM_OCM_STORAGE_DATA_SERVER_URL":"http://localhost:10280/data",
            "THUMBNAILS_DATA_ENDPOINT":"http://127.0.0.1:10190/thumbnails/data",
            "OCIS_ADD_RUN_SERVICES":"ocm",
            "OCIS_ENABLE_OCM":"true",
            "OCM_OCM_INVITE_MANAGER_INSECURE":"true",
            "OCM_OCM_SHARE_PROVIDER_INSECURE":"true",
            "OCM_OCM_STORAGE_PROVIDER_INSECURE":"true",
            "OCM_OCM_PROVIDER_AUTHORIZER_PROVIDERS_FILE":"${{ github.workspace }}/tests/config/local/providers.json"}

      # --- run ---
      - name: Combine CA certs for Node.js
        shell: bash
        run: |
          cat "$OCIS_CERT" \
            ${KEYCLOAK_CERT:+"$KEYCLOAK_CERT"} \
            ${FEDERATED_CERT:+"$FEDERATED_CERT"} \
            > /tmp/combined-ca.pem
          echo "CA_BUNDLE=/tmp/combined-ca.pem" >> "$GITHUB_ENV"
        env:
          OCIS_CERT: ${{ env.PRIMARY_OCIS_CERT || env.OCIS_CERT }}
          KEYCLOAK_CERT: ${{ env.KEYCLOAK_CERT }}
          FEDERATED_CERT: ${{ matrix.federated == true && '/home/runner/.ocis-federation/proxy/server.crt' || '' }}
      - name: Run e2e-${{ matrix.suite }}
        run: bash run-e2e.sh ${{ matrix.args }}
        working-directory: web/tests/e2e
        env:
          BASE_URL_OCIS: ${{ matrix.federated == true && 'https://localhost:9200' || 'https://127.0.0.1:9200' }}
          HEADLESS: "true"
          RETRY: "3"
          SKIP_A11Y_TESTS: "true"
          NODE_EXTRA_CA_CERTS: ${{ env.CA_BUNDLE }}
          BROWSER: chromium
          KEYCLOAK: ${{ (matrix.keycloak == true || matrix.mfa == true) && 'true' || 'false' }}
          KEYCLOAK_HOST: localhost:8443
          MFA: ${{ matrix.mfa == true && 'true' || 'false' }}
          OIDC: ${{ matrix.oidc == true && 'true' || 'false' }}
          COLLABORATION: ${{ matrix.collaboration == true && 'true' || 'false' }}
          FEDERATED: ${{ matrix.federated == true && 'true' || 'false' }}
          FEDERATED_BASE_URL_OCIS: localhost:10200

      - name: Upload tracing result
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-traces-${{ matrix.suite }}-${{ github.run_attempt }}
          path: web/reports/e2e
          retention-days: 7

      - name: Upload a11y result
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-a11y-result-${{ matrix.suite }}-${{ github.run_attempt }}
          path: web/reports/e2e/a11y-report.json
          retention-days: 7

  litmus:
    name: litmus
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          demo-users: "true"
          wrapper: "false"
          skip-test-runner-setup: "true"
          docker-accessible: "true"
          extra-server-env: '{"OCIS_ASYNC_UPLOADS":"false"}'
      - name: Run litmus
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: litmus

  cs3api:
    name: cs3api
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          demo-users: "true"
          wrapper: "false"
          skip-test-runner-setup: "true"
          extra-server-env: >-
            {"GATEWAY_GRPC_ADDR":"0.0.0.0:9142",
            "OCIS_SHARING_PUBLIC_SHARE_MUST_HAVE_PASSWORD":"false"}
      - name: Run cs3api validator
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: cs3api

  wopi-builtin:
    name: wopi-builtin
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          wrapper: "false"
          skip-test-runner-setup: "true"
          collaboration-apps: "fakeoffice"
      - name: Run WOPI validator
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: wopi-builtin

  wopi-cs3:
    name: wopi-cs3
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup oCIS
        uses: mklos-kw/ocis-github-actions/ocis-setup@main
        with:
          ocis-binary-artifact: ocis-binary
          wrapper: "false"
          skip-test-runner-setup: "true"
          collaboration-apps: "cs3-wopi"
          extra-server-env: |
            {
              "APP_PROVIDER_DRIVER": "wopi",
              "APP_PROVIDER_WOPI_APP_NAME": "FakeOffice",
              "APP_PROVIDER_WOPI_APP_URL": "http://localhost:8080",
              "APP_PROVIDER_WOPI_INSECURE": "true",
              "APP_PROVIDER_WOPI_WOPI_SERVER_EXTERNAL_URL": "http://localhost:9300",
              "APP_PROVIDER_WOPI_FOLDER_URL_BASE_URL": "https://localhost:9200"
            }
      - name: Run WOPI validator
        uses: mklos-kw/ocis-github-actions/ocis-test@main
        with:
          suite: wopi-cs3

  all-acceptance-tests:
    # Not yet gating (run but don't block merge): api-tests-email, api-tests-tika,
    # api-tests-auth-app, core-api-tests, e2e-tests
    needs: [detect-changes, unit-tests, api-tests-plain, api-tests-antivirus, api-tests-ocm, api-tests-wopi, api-tests-vault, cli-tests, litmus, cs3api, wopi-builtin, wopi-cs3]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          # If docs-only, all test jobs are expected to be skipped — that's a pass
          if [[ "${{ needs.detect-changes.outputs.docs-only }}" == "true" ]]; then
            echo "Docs-only change — skipping tests is expected."
            exit 0
          fi
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
