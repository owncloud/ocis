  core-api-tests:
    name: ${{ matrix.suite }}
    needs: []
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - "coreApiAuth,coreApiCapabilities,coreApiFavorites,coreApiMain,coreApiVersions"
          - "coreApiShareManagementBasicToShares,coreApiShareManagementToShares"
          - "coreApiSharees,coreApiSharePublicLink2"
          - "coreApiShareOperationsToShares1,coreApiShareOperationsToShares2,coreApiSharePublicLink1,coreApiShareCreateSpecialToShares1,coreApiShareCreateSpecialToShares2,coreApiShareUpdateToShares"
          - "coreApiTrashbin,coreApiTrashbinRestore,coreApiWebdavEtagPropagation1,coreApiWebdavEtagPropagation2"
          - "coreApiWebdavDelete,coreApiWebdavOperations,coreApiWebdavMove2"
          - "coreApiWebdavProperties"
          - "coreApiWebdavMove1,coreApiWebdavPreviews,coreApiWebdavUpload,coreApiWebdavUploadTUS"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Install libcurl 8.12.0 from source
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libssl-dev libnghttp2-dev libpsl-dev libldap-dev libssh-dev zlib1g-dev \
            cmake nasm meson ninja-build \
            libglib2.0-dev libexpat1-dev libpng-dev libwebp-dev libtiff5-dev liborc-0.4-dev
          cd /tmp
          curl -sLO https://curl.se/download/curl-8.12.0.tar.gz
          tar xzf curl-8.12.0.tar.gz
          cd curl-8.12.0
          ./configure --with-ssl --with-zlib --with-nghttp2 --prefix=/usr/local --enable-versioned-symbols --silent
          make -j$(nproc) --silent
          sudo make install --silent
          sudo ldconfig
          curl --version | head -1
          php -r '
            $v = curl_version()["version"];
            echo "PHP curl: $v\n";
            if (version_compare($v, "8.12.0", "<")) {
              fwrite(STDERR, "FATAL: PHP sees libcurl $v, need >= 8.12.0\n");
              exit(1);
            }
          '

      - name: Install libjpeg-turbo 3.1.2 and libvips 8.17.3 from source
        run: |
          # libjpeg-turbo 3.1.2 — matches Alpine 3.23 (owncloudci/golang:1.25)
          cd /tmp
          curl -sLO https://github.com/libjpeg-turbo/libjpeg-turbo/releases/download/3.1.2/libjpeg-turbo-3.1.2.tar.gz
          tar xzf libjpeg-turbo-3.1.2.tar.gz
          cd libjpeg-turbo-3.1.2
          cmake -G"Unix Makefiles" -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_INSTALL_LIBDIR=/usr/local/lib .
          make -j$(nproc)
          sudo make install
          sudo ldconfig

          # libvips 8.17.3 — matches Alpine 3.23 (owncloudci/golang:1.25)
          cd /tmp
          curl -sLO https://github.com/libvips/libvips/releases/download/v8.17.3/vips-8.17.3.tar.xz
          tar xf vips-8.17.3.tar.xz
          cd vips-8.17.3
          meson setup build --prefix=/usr/local --buildtype=release
          cd build
          ninja -j$(nproc)
          sudo ninja install
          sudo ldconfig

          vips --version

      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip
          tools: composer

      - name: Run ${{ matrix.suite }}
        run: >
          BEHAT_SUITES="${{ matrix.suite }}"
          ACCEPTANCE_TEST_TYPE=core-api
          EXPECTED_FAILURES_FILE=tests/acceptance/expected-failures-API-on-OCIS-storage.md
          python3 tests/acceptance/run-github.py

  all-acceptance-tests:
    needs: [core-api-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
