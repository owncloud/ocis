name: Acceptance Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  acceptance-tests:
    name: ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          # graph
          - apiGraph
          - apiGraphGroup
          - apiGraphUser
          # spaces & dav
          - apiSpaces
          - apiSpacesShares
          - apiSpacesDavOperation
          - apiDownloads
          - apiAsyncUpload
          - apiDepthInfinity
          - apiArchiver
          - apiActivities
          # search
          - apiSearch1
          # contract & locks
          - apiLocks
          # sharing
          - apiSharingNgItemInvitation
          - apiSharingNgPermissions
          - apiSharingNgShares
          - apiSharingNgAdditionalShareRole
          - apiSharingNgDriveInvitation
          - apiSharingNgItemLinkShare
          - apiSharingNgDriveLinkShare
          - apiSharingNgLinkShareManagement
          
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: curl, xml, mbstring, zip
          tools: composer

      - name: Run ${{ matrix.suite }}
        run: BEHAT_SUITES=${{ matrix.suite }} bash tests/acceptance/run-github.sh

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.suite }}
          path: tests/acceptance/output/

  all-acceptance-tests:
    needs: [acceptance-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
