          EXPECTED_FAILURES_FILE: tests/acceptance/expected-failures-API-on-OCIS-storage.md
          UPLOAD_DELETE_WAIT_TIME: "0"
          OCIS_WRAPPER_URL: ${{ env.OCIS_WRAPPER_URL }}
          WITH_REMOTE_PHP: "false"
          K8S: ${{ env.K8S }}
