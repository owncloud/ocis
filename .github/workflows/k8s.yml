      - name: Run API tests ${{matrix.suite}}
        env:
          TEST_SERVER_URL: https://ocis-server
          OCIS_REVA_DATA_ROOT: ""
          STORAGE_DRIVER: ocis
          BEHAT_FILTER_TAGS: "~@skip&&~@skipOnGraph&&~@skipOnOcis-OCIS-Storage"
          BEHAT_SUITES: ${{ matrix.suite }}
          ACCEPTANCE_TEST_TYPE: core-api
          EXPECTED_FAILURES_FILE: tests/acceptance/expected-failures-API-on-OCIS-storage.md
          UPLOAD_DELETE_WAIT_TIME: "0"
          OCIS_WRAPPER_URL: http://localhost:5200
          WITH_REMOTE_PHP: "false"
          K8S: "true"
        run: |
          if [[ "$WITH_REMOTE_PHP" != "true" ]]; then
            cat tests/acceptance/expected-failures-without-remotephp.md >> \
              "$EXPECTED_FAILURES_FILE"
          fi
          make test-acceptance-api

      - name: Cleanup Environment Setup
        run: |
          make -C tests/config/k8s cleanup || true
          docker rm -vf $(docker ps -aq) || true
