          STORAGE_DRIVER: ${{ env.STORAGE_DRIVER }}
          BEHAT_SUITES: ${{ matrix.suite }}
          BEHAT_FILTER_TAGS: "~@skip&&~@skipOnGraph&&~@skipOnOcis-OCIS-Storage"
          EXPECTED_FAILURES_FILE: tests/acceptance/expected-failures-localAPI-on-OCIS-storage.md
          OCIS_WRAPPER_URL: ${{ env.OCIS_WRAPPER_URL }}
          COLLABORATION_SERVICE_URL: http://ocis-server:9304
          K8S: "true"
        run: make test-acceptance-api

      - name: Run ${{ matrix.suite }} tests
        if: startsWith( matrix.suite, 'core' )
        env:
          TEST_SERVER_URL: ${{ env.TEST_SERVER_URL }}
          OCIS_REVA_DATA_ROOT: ""
          STORAGE_DRIVER: ocis
          BEHAT_FILTER_TAGS: "~@skip&&~@skipOnGraph&&~@skipOnOcis-OCIS-Storage"
          BEHAT_SUITES: ${{ matrix.suite }}
