        run: |
          if [[ "${{ matrix.suite }}" == "apiNotification" || \
                "${{ matrix.suite }}" == "apiSettings" || \
                "${{ matrix.suite }}" == "apiOcm" ]]; then
            docker run -d \
              -p 1025:1025 \
              -p 8025:8025 \
              --name mailpit \
              axllent/mailpit:v1.22.3
            bash tests/config/k8s/expose-external-svc.sh email:1025
