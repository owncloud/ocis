---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ocis-fonts-map
  namespace: {{ template "ocis.namespace" . }}
data:
  fontsMap.json: |
    {"defaultFont": "/etc/ocis/fonts/NotoSans.ttf"}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ocmproviders
  namespace: {{ template "ocis.namespace" . }}
data:
  ocmproviders.json: |
    [
      {
        "name": "ocis",
        "full_name": "ocis server",
        "organization": "ownCloud",
        "domain": ".*ocis-server",
        "homepage": "https://owncloud.com",
        "services": [
          {
            "endpoint": {
              "type": {
                "name": "OCM",
                "description": "ownCloud Open Cloud Mesh API"
              },
              "name": "ownCloud - OCM API",
              "path": "https://.*ocis-server/ocm/",
              "is_monitored": true
            },
            "api_version": "0.0.1",
            "host": ".*ocis-server"
          }
        ]
      }
    ]
