services:
  acceptance-tests:
    image: owncloudci/php:8.4
    working_dir: /ocis
    command: >
      /bin/bash -c "command -v composer >/dev/null 2>&1 ||
      (php -r \"copy('https://getcomposer.org/installer', '/tmp/composer-setup.php');\" &&
      php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer);
      /bin/bash /test/run-tests.sh"
    environment:
      OCIS_ROOT: /ocis
      TEST_SERVER_URL: https://ocis-server:9200
      OCIS_WRAPPER_URL: http://ocis-server:5200
      STORAGE_DRIVER: $STORAGE_DRIVER
      TEST_SOURCE: $TEST_SOURCE
      BEHAT_SUITE: ${BEHAT_SUITE:-}
      BEHAT_FEATURE: ${BEHAT_FEATURE:-}
      DIVIDE_INTO_NUM_PARTS: $DIVIDE_INTO_NUM_PARTS
      RUN_PART: $RUN_PART
      # email
      EMAIL_HOST: email
      EMAIL_PORT: 8025
    volumes:
      - ./run-tests.sh:/test/run-tests.sh
      - ../../../../:/ocis
      - ../../../../vendor-bin/behat/composer.json:/tmp/vendor-bin/behat/composer.json
