<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signed in - ownCloud</title>
  <link rel="stylesheet" href="__PATH_PREFIX__/static/theme.css">
</head>
<body class="oc-login-bg" data-bg="__BG_IMG_URL__">
  <main>
    <div class="oc-login-form">
      <img class="oc-logo" src="/themes/owncloud/assets/logo.svg" alt="ownCloud">
      <h1 class="oc-invisible-sr">Signed in</h1>
      <p class="oc-message">You are signed in. You can close this window and return to the application.</p>
      <footer class="oc-footer-message">ownCloud – a safe home for all your data</footer>
    </div>
  </main>
  <script>var bg=document.body.getAttribute("data-bg");if(bg)document.body.style.backgroundImage="url('"+bg+"')";</script>
</body>
</html>
